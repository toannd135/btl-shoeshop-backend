replicaCount: 3

image:
  repository: toannd135/shoeshop-backend
  pullPolicy: IfNotPresent
  tag: "v1.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""  
resources: {}


service:
  port: 80 
  targetPort: 8080 
  type: LoadBalancer

secret:
  dbHost: db-shoeshop-database-chart
  dbPort: "3306"
  dbName: "shoeshop"
  dbUsername: "dbshoeshop"
  dbPassword: "123456"
  idGoogle: "1026218825640-3cg8u2katgpf1026118gk2tsjl2b0n53.apps.googleusercontent.com"
  secretGoogle: "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"
  secretBase64: "qoAEABDke07+AVLepXB4aCMtsT0wMAqR5x2VFyldsnx6e75YQkJH2UcZKTjEyoNgG71SBCXfq5N6NVZxWOfsHQ=="
  atTime: "900"
  rtTime: "2592000"

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  enable: true
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 5

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    password: "123456"
  
  master:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi 

    persistence:
      enabled: true
      size: 1Gi 
      storageClass: "standard"
