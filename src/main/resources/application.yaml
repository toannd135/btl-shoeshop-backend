server:
  port: 8080
spring:
  application:
    name: shoes-shop
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/shoeshop
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    web:
      pageable:
        one-indexed-parameters: true
