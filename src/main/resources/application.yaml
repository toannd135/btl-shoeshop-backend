server:
  port: 8080

  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: "123456"
    key-store-type: PKCS12
    key-alias: tomcat

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: shoes-shop

  datasource:
    url: jdbc:mysql://localhost:3306/shoeshop
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect


  data:
    web:
      pageable:
        one-indexed-parameters: true
    redis:
      host: localhost
      port: 6379
      timeout: 2000

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${CLIENT_ID_GOOGLE}
            client-secret: ${CLIENT_SECRET_GOOGLE}
            scope:
              - profile
              - email
  mail:
    host: smtp.gmail.com
    port: 587
    username: bookshop.dpdns.org@gmail.com
    password: fzyhqujnhakuiimh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
  jackson:
    deserialization:
      fail-on-unknown-properties: false

