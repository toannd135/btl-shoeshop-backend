server:
  port: ${SERVER_PORT}

management:
  endpoints:
    web:
      exposure:
        include: health  
  endpoint:
    health:
      show-details: always 

spring:
  application:
    name: shoes-shop
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    web:
      pageable:
        one-indexed-parameters: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
