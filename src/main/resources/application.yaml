server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health  
  endpoint:
    health:
      show-details: always 

spring:
  application:
    name: shoes-shop
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shoeshop}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Thanhmessi}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    web:
      pageable:
        one-indexed-parameters: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
