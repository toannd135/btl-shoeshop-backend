<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác thực thất bại</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff1f2;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.15);
            border-top: 6px solid #b91c1c;
        }
        .icon {
            width: 90px;
            height: 90px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }
        .icon svg {
            width: 48px;
            height: 48px;
            stroke: #b91c1c;
            stroke-width: 2.5;
            fill: none;
        }
        h2 {
            color: #991b1b;
            margin-bottom: 10px;
        }
        p {
            color: #444;
            font-size: 15px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 12px 22px;
            background: #dc2626;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s ease;
        }
        a:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220,38,38,0.3);
        }
        .secondary-btn {
            background: #ffffff;
            color: #dc2626;
            border: 2px solid #dc2626;
            margin-left: 10px;
        }
        .secondary-btn:hover {
            background: #fee2e2;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">
        <!-- Red X Icon -->
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M9 9l6 6M15 9l-6 6"></path>
        </svg>
    </div>

    <h2>Xác thực thất bại!</h2>
    <p>Liên kết xác thực không hợp lệ hoặc đã hết hạn.<br>
        Vui lòng thử lại hoặc yêu cầu gửi lại email xác thực.</p>

    <a th:href="@{/register}">Đăng ký lại</a>
</div>
</body>
</html>
