<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thành công</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff1f2; /* nền đỏ rất nhạt */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 50px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.15);
            border-top: 6px solid #dc2626; /* viền đỏ trên */
        }
        .icon {
            width: 90px;
            height: 90px;
            background: #fee2e2; /* đỏ nhạt */
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }
        .icon svg {
            width: 48px;
            height: 48px;
            stroke: #dc2626; /* đỏ chủ đạo */
            stroke-width: 2.5;
            fill: none;
        }
        h2 {
            color: #b91c1c; /* đỏ đậm */
            margin-bottom: 10px;
        }
        p {
            color: #444;
            font-size: 15px;
            margin-bottom: 20px;
        }
        a {
            display: inline-block;
            padding: 12px 22px;
            background: #dc2626;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s ease;
        }
        a:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220,38,38,0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="icon">
        <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M8 12.5l2.2 2.2L16 9"></path>
        </svg>
    </div>

    <h2>Đăng ký thành công!</h2>
    <p>Tài khoản của bạn đã được tạo thành công.<br>
        Hãy quay lại Shoeshop để hoàn tất quá trình đăng nhập.</p>

    <a th:href="@{/login}">Quay về Shoeshop</a>
</div>
</body>
</html>
